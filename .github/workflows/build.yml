name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - id: build
        shell: pwsh
        run: ./build.ps1

      - uses: actions/upload-artifact@v4
        with:
          name: flashy-toast
          path: ${{ steps.build.outputs.exe }}
          if-no-files-found: error
