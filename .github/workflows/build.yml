name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - id: build
        shell: pwsh
        # CI builds are unsigned — no code-signing cert is available on the
        # PR runner. The release workflow signs.
        run: ./build.ps1 -Sign:$false

      - uses: actions/upload-artifact@v4
        with:
          name: flashy-toast-msix-unsigned
          path: ${{ steps.build.outputs.msix }}
          if-no-files-found: error
