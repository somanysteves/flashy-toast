name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - id: build
        shell: pwsh
        run: ./build.ps1

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: gh release create $env:GITHUB_REF_NAME "${{ steps.build.outputs.exe }}" --title $env:GITHUB_REF_NAME --generate-notes
